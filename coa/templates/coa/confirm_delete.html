<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Delete — Hiya COA System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: #f6f8fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .box { background: #fff; border-radius: 16px; padding: 40px 36px; max-width: 420px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.1); text-align: center; }
        .icon { font-size: 3rem; margin-bottom: 16px; }
        h1 { font-size: 1.2rem; color: #dc2626; margin-bottom: 10px; }
        p  { font-size: 0.88rem; color: #555; line-height: 1.7; margin-bottom: 24px; }
        .actions { display: flex; gap: 12px; justify-content: center; }
        .btn-cancel { padding: 10px 24px; border-radius: 8px; border: 1.5px solid #d0d7de; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; text-decoration: none; color: #555; background: #fff; }
        .btn-delete { padding: 10px 24px; border-radius: 8px; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; background: #dc2626; color: #fff; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">🗑️</div>
        <h1>Delete COA?</h1>
        <p>
            You are about to permanently delete:<br>
            <strong>{{ coa.product_name }}</strong><br>
            Batch: <strong>{{ coa.batch_no }}</strong><br><br>
            All test results and custom fields will also be deleted. This cannot be undone.
        </p>
        <div class="actions">
            <a href="{% url 'coa_list' %}" class="btn-cancel">← Cancel</a>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn-delete">Delete Permanently</button>
            </form>
        </div>
    </div>
</body>
</html>
