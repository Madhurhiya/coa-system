<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete User — Hiya COA</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gd:#1a3c2e; --gold:#f5c800; --bg:#f6f8fa; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); min-height:100vh; }
        .navbar { background:var(--gd); height:56px; padding:0 32px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
        .navbar-brand { font-size:1.05rem; font-weight:700; color:#fff; text-decoration:none; }
        .navbar-brand span { color:var(--gold); }
        .nav-link { color:rgba(255,255,255,0.75); font-size:0.85rem; text-decoration:none; }
        .page-wrapper { max-width:480px; margin:60px auto; padding:0 16px; }
        .card { background:#fff; border-radius:14px; box-shadow:0 2px 8px rgba(0,0,0,0.07); padding:32px; text-align:center; }
        .card h2 { font-size:1.3rem; font-weight:800; color:#b91c1c; margin-bottom:14px; }
        .card p { color:#374151; font-size:0.92rem; margin-bottom:24px; line-height:1.6; }
        .card strong { color:#1a3c2e; }
        .actions { display:flex; gap:12px; justify-content:center; }
        .btn { padding:11px 24px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:700; text-decoration:none; border:none; cursor:pointer; }
        .btn-danger { background:#dc2626; color:#fff; }
        .btn-cancel { background:#e8f5e9; color:#1a3c2e; }
        .btn:hover { opacity:0.87; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="{% url 'coa_list' %}" class="navbar-brand">🧪 <span>hiya</span> COA System</a>
    <a href="{% url 'user_list' %}" class="nav-link">← Back to Users</a>
</nav>
<div class="page-wrapper">
    <div class="card">
        <h2>⚠️ Delete User</h2>
        <p>Are you sure you want to permanently delete the user <strong>{{ target_user.username }}</strong>?<br>This action cannot be undone.</p>
        <div class="actions">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
            </form>
            <a href="{% url 'user_list' %}" class="btn btn-cancel">Cancel</a>
        </div>
    </div>
</div>
</body>
</html>
